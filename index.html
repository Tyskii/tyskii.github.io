<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YANGTAO 的个人主页</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 20px;
      line-height: 1.8;
      color: #1f2937;
      background: #f9fafb;
    }
    .hero, .card {
      background: white;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
      margin-bottom: 24px;
    }
    h1, h2 {
      margin-top: 0;
    }
    .muted {
      color: #6b7280;
    }
    .links a {
      display: inline-block;
      margin-right: 14px;
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .links a:hover {
      text-decoration: underline;
    }
    ul {
      padding-left: 20px;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>你好，我是 YANGTAO</h1>
    <p class="muted">欢迎来到我的个人主页。</p>
    <p>这里会展示我的介绍、项目、学习记录和联系方式。</p>
    <div class="links">
      <a href="https://github.com/Tyskii" target="_blank">GitHub</a>
      <a href="mailto:your@email.com">邮箱</a>
    </div>
  </section>

  <section class="card">
    <h2>关于我</h2>
    <p>我正在搭建自己的个人网站，并持续整理作品与经历。</p>
  </section>

  <section class="card">
    <h2>项目</h2>
    <ul>
      <li>项目 1：这里写你的项目简介</li>
      <li>项目 2：这里写你的项目简介</li>
      <li>项目 3：这里写你的项目简介</li>
    </ul>
  </section>

  <section class="card">
    <h2>联系我</h2>
    <p>欢迎通过 GitHub 或邮箱联系我。</p>
  </section>
</body>
</html>
